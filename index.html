<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultimate Learning Game</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    text-align:center;
    overflow-x:hidden;
}

button{
    touch-action:manipulation;
}

.back-btn{
    position:fixed;
    top:15px;
    left:15px;
    padding:10px 18px;
    border:none;
    border-radius:10px;
    background:black;
    color:white;
    font-size:16px;
    cursor:pointer;
    display:none;
    z-index:1000;
}

/* HOME */

#startPage{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
    padding:20px;
}

.btn{
    padding:18px 30px;
    border:none;
    border-radius:15px;
    color:white;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    min-width:220px;
}

.prime-btn{ background:#007bff; }
.math-btn{ background:#ff9800; }
.square-btn{ background:#9c27b0; }
.cube-btn{ background:#009688; }
.alpha-btn{ background:#e91e63; }
.giveup-btn{ background:#f44336; }

/* PRIME */

#primePage{
    display:none;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(5,70px);
    gap:10px;
    justify-content:center;
    margin:auto;
}

.box{
    width:70px;
    height:70px;
    background:white;
    border:2px solid #ccc;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.prime{
    background:green;
    color:white;
}

.wrong{
    background:red;
    color:white;
}

/* SPEED MATH */

#mathPage{
    display:none;
    padding:20px;
}

.math-container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.symbol-container{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.symbol-btn{
    width:70px;
    height:70px;
    border:none;
    border-radius:15px;
    font-size:35px;
    cursor:pointer;
    background:#f0f0f0;
}

.selected{
    background:green;
    color:white;
}

.mini-box-container{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
    margin-top:25px;
}

.mini-box{
    width:110px;
    background:#fafafa;
    border:2px solid #ddd;
    border-radius:18px;
    padding:12px;
}

.mini-box h3{
    margin:0 0 10px;
    font-size:16px;
}

.mini-box input,
.mini-box select{
    width:100%;
    margin:0;
    text-align:center;
}

#mathQuestion{
    font-size:55px;
    font-weight:bold;
    margin-top:30px;
}

#answerInput{
    width:90%;
    max-width:300px;
    padding:15px;
    font-size:18px;
    text-align:center;
    margin-top:20px;
    border-radius:10px;
    border:2px solid #ccc;
}

#timer{
    font-size:30px;
    margin-top:20px;
    font-weight:bold;
}

#liveScore{
    font-size:22px;
    margin-top:10px;
}

/* QUIZ */

#quizPage{
    display:none;
    padding:20px;
}

.mode-buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

.mode-buttons button{
    padding:15px 25px;
    border:none;
    border-radius:15px;
    color:white;
    font-size:22px;
    cursor:pointer;
}

#question{
    font-size:60px;
    font-weight:bold;
    margin-bottom:40px;
}

.options{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    width:95%;
    max-width:500px;
    margin:auto;
}

.option-btn{
    padding:22px;
    border:none;
    border-radius:15px;
    background:white;
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
}

.correct{
    background:green !important;
    color:white;
}

.incorrect{
    background:red !important;
    color:white;
}

input,
select{
    padding:12px;
    font-size:16px;
    border-radius:10px;
    border:2px solid #ccc;
}

/* MOBILE */

@media (max-width:768px){

    #startPage{
        flex-direction:column;
    }

    .btn{
        width:90%;
        font-size:20px;
    }

    .grid{
        grid-template-columns:repeat(5,60px);
        gap:8px;
    }

    .box{
        width:60px;
        height:60px;
        font-size:18px;
    }

    .symbol-btn{
        width:60px;
        height:60px;
        font-size:28px;
    }

    #mathQuestion{
        font-size:38px;
    }

    #question{
        font-size:42px;
    }

    .option-btn{
        font-size:22px;
        padding:18px;
    }

}

</style>
</head>

<body>

<button class="back-btn"
id="backBtn"
onclick="goBack()">
BACK
</button>

<!-- HOME -->

<div id="startPage">

<button class="btn prime-btn"
onclick="openPrimeGame()">
PRIME GAME
</button>

<button class="btn math-btn"
onclick="openMathGame()">
SPEED MATH
</button>

<button class="btn square-btn"
onclick="openSquareMenu()">
SQUARE
</button>

<button class="btn cube-btn"
onclick="openCubeMenu()">
CUBE
</button>

<button class="btn alpha-btn"
onclick="openAlphabetMenu()">
ALPHABETS
</button>

</div>

<!-- PRIME -->

<div id="primePage">

<h1>Find Prime Numbers</h1>

<div class="grid"
id="primeGrid"></div>

<br>

<button class="btn giveup-btn"
onclick="showPrimeAnswers()">
GIVE UP
</button>

</div>

<!-- SPEED MATH -->

<div id="mathPage">

<div class="math-container">

<h1>Speed Math</h1>

<div id="settingsArea">

<div class="symbol-container">

<button class="symbol-btn"
onclick="toggleOperation('+',this)">
+
</button>

<button class="symbol-btn"
onclick="toggleOperation('-',this)">
-
</button>

<button class="symbol-btn"
onclick="toggleOperation('*',this)">
×
</button>

<button class="symbol-btn"
onclick="toggleOperation('/',this)">
÷
</button>

</div>

<div class="mini-box-container">

<div class="mini-box">

<h3>MIN</h3>

<input type="number"
id="minRange"
value="0">

</div>

<div class="mini-box">

<h3>MAX</h3>

<input type="number"
id="maxRange"
value="100">

</div>

<div class="mini-box">

<h3>TIME</h3>

<select id="timeSelect">

<option value="60">1 Min</option>
<option value="120">2 Min</option>
<option value="180">3 Min</option>
<option value="300">5 Min</option>

</select>

</div>

</div>

<br>

<button class="btn math-btn"
onclick="startMathGame()">
START
</button>

</div>

<div id="mathQuiz"
style="display:none;">

<div id="timer">60</div>

<div id="liveScore">
Correct : 0
</div>

<div id="mathQuestion">
5 + 5
</div>

<input type="number"
id="answerInput">

<br><br>

<button class="btn giveup-btn"
onclick="showMathAnswer()">
GIVE UP
</button>

</div>

</div>

</div>

<!-- QUIZ PAGE -->

<div id="quizPage">

<div class="mode-buttons"
id="modeButtons"></div>

<div id="question">A</div>

<div class="options"
id="optionsBox"></div>

<br>

<button class="btn giveup-btn"
onclick="showQuizAnswer()">
GIVE UP
</button>

</div>

<script>

const startPage =
document.getElementById("startPage");

const primePage =
document.getElementById("primePage");

const mathPage =
document.getElementById("mathPage");

const quizPage =
document.getElementById("quizPage");

const backBtn =
document.getElementById("backBtn");

const modeButtons =
document.getElementById("modeButtons");

const question =
document.getElementById("question");

const optionsBox =
document.getElementById("optionsBox");

let currentMode = "";
let currentCorrectAnswer = 0;

/* HIDE */

function hideAll(){

    startPage.style.display = "none";
    primePage.style.display = "none";
    mathPage.style.display = "none";
    quizPage.style.display = "none";

}

function goBack(){

    location.reload();

}

/* PRIME */

function isPrime(num){

    if(num < 2){
        return false;
    }

    for(let i=2;i<=Math.sqrt(num);i++){

        if(num % i === 0){
            return false;
        }

    }

    return true;

}

function openPrimeGame(){

    hideAll();

    primePage.style.display = "block";
    backBtn.style.display = "block";

    const grid =
    document.getElementById("primeGrid");

    grid.innerHTML = "";

    let numbers = [];

    for(let i=1;i<=100;i++){
        numbers.push(i);
    }

    numbers.sort(() => Math.random() - 0.5);

    numbers.forEach(number => {

        const box =
        document.createElement("div");

        box.className = "box";

        box.innerText = number;

        box.onclick = function(){

            if(isPrime(number)){
                box.classList.add("prime");
            }
            else{
                box.classList.add("wrong");
            }

        };

        grid.appendChild(box);

    });

}

function showPrimeAnswers(){

    const boxes =
    document.querySelectorAll(".box");

    boxes.forEach(box => {

        let num =
        Number(box.innerText);

        if(isPrime(num)){
            box.classList.add("prime");
        }

    });

}

/* SPEED MATH */

let selectedOperations = [];
let mathAnswer = 0;
let timer;
let score = 0;
let timeLeft = 60;

function openMathGame(){

    hideAll();

    mathPage.style.display = "block";
    backBtn.style.display = "block";

}

function toggleOperation(operation,button){

    if(selectedOperations.includes(operation)){

        selectedOperations =
        selectedOperations.filter(
            op => op !== operation
        );

        button.classList.remove("selected");

    }
    else{

        selectedOperations.push(operation);

        button.classList.add("selected");

    }

}

function startMathGame(){

    if(selectedOperations.length === 0){

        alert("Select operation");
        return;

    }

    document.getElementById("settingsArea")
    .style.display = "none";

    document.getElementById("mathQuiz")
    .style.display = "block";

    timeLeft =
    Number(
        document.getElementById("timeSelect").value
    );

    document.getElementById("timer")
    .innerText = timeLeft;

    generateMathQuestion();

    clearInterval(timer);

    timer = setInterval(() => {

        timeLeft--;

        document.getElementById("timer")
        .innerText = timeLeft;

        if(timeLeft <= 0){

            clearInterval(timer);

            alert(
                "Correct : " + score
            );

            location.reload();

        }

    },1000);

}

function generateMathQuestion(){

    let min =
    Number(
        document.getElementById("minRange").value
    );

    let max =
    Number(
        document.getElementById("maxRange").value
    );

    let a,b;

    let randomOperation =
    selectedOperations[
        Math.floor(
            Math.random()
            * selectedOperations.length
        )
    ];

    if(randomOperation === "+"){

        a =
        Math.floor(Math.random()*(max-min+1))+min;

        b =
        Math.floor(Math.random()*(max-min+1))+min;

        mathAnswer = a+b;

    }

    else if(randomOperation === "-"){

        a =
        Math.floor(Math.random()*(max-min+1))+min;

        b =
        Math.floor(Math.random()*(max-min+1))+min;

        if(b>a){

            let temp=a;
            a=b;
            b=temp;

        }

        mathAnswer = a-b;

    }

    else if(randomOperation === "*"){

        a =
        Math.floor(Math.random()*(max-min+1))+min;

        b =
        Math.floor(Math.random()*(max-min+1))+min;

        mathAnswer = a*b;

    }

    else{

        b =
        Math.floor(Math.random()*(max-min+1))+min;

        if(b===0){
            b=1;
        }

        mathAnswer =
        Math.floor(Math.random()*20)+1;

        a = mathAnswer*b;

    }

    document.getElementById("mathQuestion")
    .innerText =
    a + " " + randomOperation + " " + b;

    document.getElementById("answerInput")
    .value = "";

}

document.getElementById("answerInput")
.addEventListener("input",function(){

    if(this.disabled){
        return;
    }

    let value =
    Number(this.value);

    if(value === mathAnswer){

        score++;

        document.getElementById("liveScore")
        .innerText =
        "Correct : " + score;

        this.disabled = true;

        setTimeout(() => {

            this.value = "";

            this.disabled = false;

            generateMathQuestion();

            this.focus();

        },500);

    }

});

function showMathAnswer(){

    const input =
    document.getElementById("answerInput");

    input.disabled = true;

    input.value = mathAnswer;

    input.blur();

    setTimeout(() => {

        input.value = "";

        input.disabled = false;

        generateMathQuestion();

        input.focus();

    },2000);

}

/* MENUS */

function openSquareMenu(){

    hideAll();

    quizPage.style.display = "block";
    backBtn.style.display = "block";

    modeButtons.innerHTML = `

    <button style="background:#9c27b0"
    onclick="squareGame()">
    Square
    </button>

    <button style="background:#9c27b0"
    onclick="squareRootGame()">
    Square Root
    </button>

    `;

}

function openCubeMenu(){

    hideAll();

    quizPage.style.display = "block";
    backBtn.style.display = "block";

    modeButtons.innerHTML = `

    <button style="background:#009688"
    onclick="cubeGame()">
    Cube
    </button>

    <button style="background:#009688"
    onclick="cubeRootGame()">
    Cube Root
    </button>

    `;

}

function openAlphabetMenu(){

    hideAll();

    quizPage.style.display = "block";
    backBtn.style.display = "block";

    modeButtons.innerHTML = `

    <button style="background:#e91e63"
    onclick="letterNoGame()">
    Letter No
    </button>

    <button style="background:#e91e63"
    onclick="oppositeGame()">
    Opposite
    </button>

    `;

}

/* GAMES */

function squareGame(){

    currentMode = "square";

    let num =
    Math.floor(Math.random()*30)+1;

    currentCorrectAnswer =
    num*num;

    question.innerText =
    num + "²";

    createNumberOptions(currentCorrectAnswer);

}

function squareRootGame(){

    currentMode = "squareRoot";

    let num =
    Math.floor(Math.random()*30)+1;

    currentCorrectAnswer = num;

    question.innerText =
    "√" + (num*num);

    createNumberOptions(currentCorrectAnswer);

}

function cubeGame(){

    currentMode = "cube";

    let num =
    Math.floor(Math.random()*20)+1;

    currentCorrectAnswer =
    num*num*num;

    question.innerText =
    num + "³";

    createNumberOptions(currentCorrectAnswer);

}

function cubeRootGame(){

    currentMode = "cubeRoot";

    let num =
    Math.floor(Math.random()*20)+1;

    currentCorrectAnswer = num;

    question.innerText =
    "∛" + (num*num*num);

    createNumberOptions(currentCorrectAnswer);

}

function letterNoGame(){

    currentMode = "letterNo";

    const letters =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    let index =
    Math.floor(Math.random()*26);

    question.innerText =
    letters[index];

    currentCorrectAnswer =
    index + 1;

    createNumberOptions(currentCorrectAnswer);

}

function oppositeGame(){

    currentMode = "opposite";

    const letters =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    let index =
    Math.floor(Math.random()*26);

    question.innerText =
    letters[index];

    currentCorrectAnswer =
    letters[25-index];

    createLetterOptions(currentCorrectAnswer);

}

/* OPTIONS */

function createNumberOptions(correct){

    optionsBox.innerHTML = "";

    let options = [correct];

    while(options.length < 4){

        let random =
        correct +
        Math.floor(Math.random()*15)-7;

        if(random > 0 &&
        !options.includes(random)){

            options.push(random);

        }

    }

    options.sort(() => Math.random()-0.5);

    options.forEach(option => {
        createButton(option);
    });

}

function createLetterOptions(correct){

    optionsBox.innerHTML = "";

    const letters =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    let options = [correct];

    while(options.length < 4){

        let random =
        letters[
            Math.floor(Math.random()*26)
        ];

        if(!options.includes(random)){
            options.push(random);
        }

    }

    options.sort(() => Math.random()-0.5);

    options.forEach(option => {
        createButton(option);
    });

}

function createButton(option){

    const btn =
    document.createElement("button");

    btn.className = "option-btn";

    btn.innerText = option;

    btn.onclick = function(){

        checkAnswer(btn,option);

    };

    optionsBox.appendChild(btn);

}

function checkAnswer(button,answer){

    const buttons =
    document.querySelectorAll(".option-btn");

    buttons.forEach(btn => {

        btn.disabled = true;

        if(btn.innerText ==
        currentCorrectAnswer){

            btn.classList.add("correct");
        }

    });

    if(answer != currentCorrectAnswer){
        button.classList.add("incorrect");
    }

    setTimeout(() => {

        nextQuizQuestion();

    },1000);

}

function nextQuizQuestion(){

    if(currentMode === "square"){
        squareGame();
    }

    else if(currentMode === "squareRoot"){
        squareRootGame();
    }

    else if(currentMode === "cube"){
        cubeGame();
    }

    else if(currentMode === "cubeRoot"){
        cubeRootGame();
    }

    else if(currentMode === "letterNo"){
        letterNoGame();
    }

    else if(currentMode === "opposite"){
        oppositeGame();
    }

}

function showQuizAnswer(){

    const buttons =
    document.querySelectorAll(".option-btn");

    buttons.forEach(btn => {

        btn.disabled = true;

        if(btn.innerText ==
        currentCorrectAnswer){

            btn.classList.add("correct");

        }

    });

    setTimeout(() => {

        nextQuizQuestion();

    },2000);

}

</script>

</body>
</html>
